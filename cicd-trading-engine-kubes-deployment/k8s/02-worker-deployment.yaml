# k8s/02-worker-deployment.yaml
# ─────────────────────────────────────────────────────────────────
# Celery Worker — Deployment
# IMAGE_PLACEHOLDER is replaced by the CI/CD pipeline via sed
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: trading-engine
  labels:
    app: celery-worker
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: celery-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 60    # Allow in-flight tasks to complete
      containers:
        - name: celery-worker
          image: IMAGE_PLACEHOLDER         # ← replaced by sed in CI/CD
          imagePullPolicy: Always
          # Override the default CMD to run Celery worker
          command:
            - "celery"
            - "-A"
            - "app.worker.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=2"
            - "--queues=analysis"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_URL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: CELERY_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CELERY_CONCURRENCY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
          livenessProbe:
            exec:
              # Check Celery worker is alive via celery inspect ping
              command:
                - "celery"
                - "-A"
                - "app.worker.celery_app"
                - "inspect"
                - "ping"
                - "-d"
                - "celery@$HOSTNAME"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3

---
# ─────────────────────────────────────────────────────────────────
# HPA for Workers — scales up when tasks pile up
# ─────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: trading-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
