# docker-compose.yml
# ─────────────────────────────────────────────────────────────────
# Local Development Stack
# Usage:
#   docker compose up --build          ← start everything
#   docker compose down -v             ← stop and remove volumes
#   docker compose logs -f worker      ← tail worker logs
# ─────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB:       trading_signals
      POSTGRES_USER:     tradingadmin
      POSTGRES_PASSWORD: changeme_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingadmin -d trading_signals"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Run DB Migrations ──────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://tradingadmin:changeme_local@postgres:5432/trading_signals
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"      # Run once then exit

  # ── FastAPI API Gateway ────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tradingadmin:changeme_local@postgres:5432/trading_signals
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  local
      LOG_LEVEL:    debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app    # Hot-reload: mount source code

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-worker
    command:
      - "celery"
      - "-A"
      - "app.worker.celery_app"
      - "worker"
      - "--loglevel=info"
      - "--concurrency=2"
      - "--queues=analysis"
    environment:
      DATABASE_URL: postgresql://tradingadmin:changeme_local@postgres:5432/trading_signals
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  local
      LOG_LEVEL:    info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app

  # ── Flower (Celery Monitor) ────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: trading-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT:       5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
