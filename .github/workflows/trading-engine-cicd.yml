# ═════════════════════════════════════════════
# JOB 6 — SLACK / TEAMS NOTIFICATION (optional)
# ═════════════════════════════════════════════
  final-report:
    name: Final Report & Notify
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    if: always() && github.ref == 'refs/heads/main'
    # env:
    #   # Wire Slack once at the job level so conditionals can use it
    #   SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Compute final status
        id: status
        run: |
          RESULT="${{ needs.terraform-apply.result }}"
          # Handle the edge case where terraform-apply didn't run or returned empty
          if [ -z "$RESULT" ]; then
            RESULT="skipped"
          fi

          case "$RESULT" in
            success)
              echo "status=success" >> "$GITHUB_OUTPUT"
              echo "color=good"     >> "$GITHUB_OUTPUT"
              echo "emoji=✅"       >> "$GITHUB_OUTPUT"
              ;;
            cancelled)
              echo "status=cancelled" >> "$GITHUB_OUTPUT"
              echo "color=warning"    >> "$GITHUB_OUTPUT"
              echo "emoji=⏸️"         >> "$GITHUB_OUTPUT"
              ;;
            failure)
              echo "status=failure" >> "$GITHUB_OUTPUT"
              echo "color=danger"   >> "$GITHUB_OUTPUT"
              echo "emoji=❌"        >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "status=skipped" >> "$GITHUB_OUTPUT"
              echo "color=warning"  >> "$GITHUB_OUTPUT"
              echo "emoji=ℹ️"       >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Final GitHub Summary (Markdown)
        env:
          STATUS:  ${{ steps.status.outputs.status }}
          EMOJI:   ${{ steps.status.outputs.emoji }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          # Link directly to the exact TFC run we created in the plan job
          TFC_RUN_URL: https://app.terraform.io/app/${{ secrets.TFC_ORGANIZATION }}/workspaces/${{ secrets.TFC_WORKSPACE }}/runs/${{ needs.terraform-plan.outputs.run-id }}
        run: |
          {
            echo "# ${EMOJI} Final Report"
            echo ""
            echo "- **Status**: \`${STATUS}\`"
            echo "- **Workflow**: \`${{ github.workflow }}\`"
            echo "- **Run**: [#${{ github.run_number }}](${RUN_URL})"
            echo "- **Branch**: \`${{ github.ref_name }}\`"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Terraform apply**: \`${{ needs.terraform-apply.result }}\`"
            echo "- **Terraform plan run**: ${TFC_RUN_URL}"
            if [ -n "${IMAGE_URI}" ]; then
              echo "- **Image**: \`${IMAGE_URI}\`"
            fi
            echo ""
            echo "## Artifacts & Outputs"
            echo "- Plan had changes: \`${{ needs.terraform-plan.outputs['plan-has-changes'] }}\`"
            echo ""
            echo "> Tip: Expose additional values from earlier jobs via \`$GITHUB_OUTPUT\` and read them here with \`needs.<job>.outputs.<key>\`."
          } >> "$GITHUB_STEP_SUMMARY"


      # - name: (Optional) Slack – Final Report
      #   if: ${{ env.SLACK_WEBHOOK != '' }}
      #   env:
      #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
