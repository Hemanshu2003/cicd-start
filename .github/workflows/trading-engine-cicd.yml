name: Trading Engine — CI/CD Pipeline

# ─────────────────────────────────────────────
# TRIGGER: Only fires when files inside the
# trading-engine/ application folder change.
# Change this path to match your actual folder.
# ─────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      environment:
        required: true

  
  push:
    branches:
      - main
    paths:
      - "03-cicd-trading-engine-kubes-deployment/**"          # ← change to your actual app folder name
      - ".github/workflows/trading-engine-cicd.yml"

  pull_request:
    branches:
      - main
    paths:
      - "03-cicd-trading-engine-kubes-deployment/**"
      - ".github/workflows/trading-engine-cicd.yml"

# Cancel any in-progress run for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
# GLOBAL ENV — set these in GitHub Secrets
# ─────────────────────────────────────────────
env:
  APP_FOLDER: 03-cicd-trading-engine-kubes-deployment            # ← your app folder name
  TF_FOLDER: 03-cicd-trading-engine-kubes-deployment/terraform   # ← terraform subfolder inside app folder
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: trading-engine
  IMAGE_TAG: ${{ github.sha }}

