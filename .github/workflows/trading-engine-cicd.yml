# ═════════════════════════════════════════════
# JOB 2 — BUILD & PUSH DOCKER IMAGE TO ECR
# Only runs on push to main or develop
# ═════════════════════════════════════════════
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    # needs: test
    if: github.event_name == 'push'
    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it doesn't exist
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Build, tag & push image to ECR
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: ${{ env.APP_FOLDER }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg GIT_SHA=${{ github.sha }} \
            --cache-from "$LATEST_URI" \
            -t "$IMAGE_URI" \
            -t "$LATEST_URI" \
            -f Dockerfile .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $IMAGE_URI"

# ═════════════════════════════════════════════
# JOB 3 — TERRAFORM PLAN (via Terraform Cloud)
# Runs on both PRs and pushes
# ═════════════════════════════════════════════
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    # needs: [test] // ignoring test 
    # Run plan on PRs too (without apply) for review
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      run-id:          ${{ steps.tfc-run.outputs.run_id }}
      run-status:      ${{ steps.tfc-run.outputs.run_status }}
      plan-has-changes: ${{ steps.plan-output.outputs.has_changes }}

    env:
      TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORGANIZATION }}   # Your TFC org name
      TF_WORKSPACE:          ${{ secrets.TFC_WORKSPACE }}      # e.g. "trading-engine-prod"
      TF_API_TOKEN:          ${{ secrets.TF_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Upload the terraform directory to Terraform Cloud as a config version
      - name: Upload Terraform configuration to TFC
        id: tfc-upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        with:
          workspace:    ${{ env.TF_WORKSPACE }}
          directory:    ${{ env.TF_FOLDER }}
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          token:        ${{ env.TF_API_TOKEN }}

      # Create a speculative plan run in TFC
      - name: Create TFC plan run
        id: tfc-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        with:
          workspace:       ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.tfc-upload.outputs.configuration_version_id }}
          organization:    ${{ env.TF_CLOUD_ORGANIZATION }}
          token:           ${{ env.TF_API_TOKEN }}
          # Speculative = plan only, never apply (safe for PRs)
          plan_only:       ${{ github.event_name == 'pull_request' }}
          message:         "Triggered by GitHub Actions — commit ${{ github.sha }}"

      # Fetch and display the plan output
      - name: Get plan output
        id: plan-output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        with:
          plan:         ${{ steps.tfc-run.outputs.plan_id }}
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          token:        ${{ env.TF_API_TOKEN }}

      # Post plan summary as a PR comment
      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = {
              add:    '${{ steps.plan-output.outputs.add }}',
              change: '${{ steps.plan-output.outputs.change }}',
              destroy:'${{ steps.plan-output.outputs.destroy }}',
              runId:  '${{ steps.tfc-run.outputs.run_id }}',
              org:    '${{ env.TF_CLOUD_ORGANIZATION }}',
              ws:     '${{ env.TF_WORKSPACE }}'
            };
            const tfcUrl = `https://app.terraform.io/app/${plan.org}/workspaces/${plan.ws}/runs/${plan.runId}`;
            const body = [
              `## 🏗️ Terraform Plan — Trading Engine`,
              ``,
              `| Resource Action | Count |`,
              `|-----------------|-------|`,
              `| ➕ Add          | ${plan.add} |`,
              `| 🔄 Change       | ${plan.change} |`,
              `| ❌ Destroy      | ${plan.destroy} |`,
              ``,
              `📋 [View full plan in Terraform Cloud](${tfcUrl})`,
              ``,
              `> ⚠️ Review the destroy count before merging.`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# ═════════════════════════════════════════════
# JOB 4 — TERRAFORM APPLY (via Terraform Cloud)
# Only runs on push to main after plan succeeds
# ═════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-plan]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment:
      name: production          # Requires manual approval in GitHub Environments
      url: https://app.terraform.io

    env:
      TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORGANIZATION }}
      TF_WORKSPACE:          ${{ secrets.TFC_WORKSPACE }}
      TF_API_TOKEN:          ${{ secrets.TF_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Apply the exact run that was planned — never apply a different plan
      - name: Apply TFC run
        id: tfc-apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        with:
          run:          ${{ needs.terraform-plan.outputs.run-id }}
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          token:        ${{ env.TF_API_TOKEN }}
          comment:      "Auto-approved by GitHub Actions — ${{ github.sha }}"

      - name: Confirm apply status
        run: |
          echo "✅ Terraform Apply status: ${{ steps.apply.outputs.status }}"
          if (( "${{ steps.apply.outputs.status }}" != "Success" )); then
            echo "❌ Apply did not complete successfully"
            exit 1
          fi

